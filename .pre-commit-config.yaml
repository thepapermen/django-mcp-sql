# Pre-commit gate for django-mcp-sql. Mirrors the gate the package ran under
# in its origin monorepo, with two floor-aware adaptations: django-upgrade
# targets 4.2 (the package's minimum Django) and ruff targets py311 (via
# [tool.ruff] in pyproject.toml) — neither may rewrite code past the supported
# floor. Enforced in CI by the `lint` job (.github/workflows/ci.yml).
#
# Install locally once per clone:  pre-commit install   (or: make hooks)
exclude: '^example/|(^|/)migrations/'
default_stages: [pre-commit]
minimum_pre_commit_version: "3.2.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key

  - repo: https://github.com/adamchainz/django-upgrade
    rev: '1.22.2'
    hooks:
      - id: django-upgrade
        # 4.2 — the package's minimum supported Django (NOT 5.0 as upstream):
        # the rewrites must never introduce an API unavailable on 4.2.
        args: ['--target-version', '4.2']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/Riverside-Healthcare/djLint
    rev: v1.36.4
    hooks:
      - id: djlint-reformat-django
      - id: djlint-django
