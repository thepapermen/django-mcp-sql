# CI for the extracted django-mcp-sql repository (this package directory
# becomes the repo root — see RELEASING.md). Inert while the package lives
# inside the monorepo: Bitbucket Pipelines ignores `.github/`, and the
# directory ships in neither the wheel nor the sdist packages list.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Ragged Django × Python matrix (each leg resolves the NEWEST in-range
      # DRF/DOT/allauth for its Django line, so the 6.0 legs pull DRF 3.17).
      # The columns are ragged because the interpreters differ per Django:
      # 6.0 dropped Python 3.11, and 4.2 never supported 3.13.
      matrix:
        include:
          - { python-version: "3.11", django: "4.2" }
          - { python-version: "3.12", django: "4.2" }
          - { python-version: "3.11", django: "5.2" }
          - { python-version: "3.12", django: "5.2" }
          - { python-version: "3.13", django: "5.2" }
          - { python-version: "3.12", django: "6.0" }
          - { python-version: "3.13", django: "6.0" }
    services:
      postgres:
        # The documented PostgreSQL floor (README "Compatibility").
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Bootstrap the MCP read-only role
        # Several tests enter `mcp_readonly_role` on a real connection
        # (`SET LOCAL ROLE`), so the role must exist cluster-wide.
        # `app_role=postgres` mirrors the script's contract: the readonly
        # role is granted TO the role the app connects as. (Separately, the
        # service's `postgres` user being a superuser is what lets the
        # role-isolation tests run instead of skipping — they create their
        # own roles and check `rolsuper`.)
        run: >-
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d postgres
          -v ON_ERROR_STOP=1 -v app_role=postgres -f sql/role_setup.sql
      - name: Install package + test deps
        # Pin only the Django line; DRF/DOT/allauth resolve to the newest
        # in-range release for that Django (this is the "newest-resolve" arm).
        run: pip install -e '.[allauth,test]' "Django==${{ matrix.django }}.*"
      - name: Run the test suite
        # tests/settings.py defaults match the service container
        # (127.0.0.1:5432, postgres/postgres); `--pyargs` collects via the
        # installed package name, independent of the checkout layout.
        run: pytest --pyargs mcp_sql.tests --create-db --nomigrations

  # Drop-in leg: an existing Django 4.2 app may pin an older DRF than this
  # package's >=3.17 floor. The package's DRF surface is narrow (an
  # OAuth2Authentication subclass, @api_view, IsAuthenticated) and stable
  # back to DRF 3.14, so it runs on such a stack even though a greenfield
  # install would never resolve DRF 3.14 (the floor under-promises it on
  # purpose). This pins that corner — DRF 3.14 + Django 4.2 — to prove it.
  # Boundary: DRF 3.14 does NOT support Django >=5.0, so this pairing is
  # only ever valid on the 4.2 line.
  test-legacy-drf:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bootstrap the MCP read-only role
        run: >-
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d postgres
          -v ON_ERROR_STOP=1 -v app_role=postgres -f sql/role_setup.sql
      - name: Install package against a legacy pinned DRF
        run: pip install -e '.[allauth,test]' "Django==4.2.*" "djangorestframework==3.14.*"
      - name: Run the test suite
        run: pytest --pyargs mcp_sql.tests --create-db --nomigrations

  # The matrix above resolves the NEWEST in-range versions; this job pins
  # every runtime dependency to its declared floor so the lower bounds in
  # pyproject.toml are actually exercised — without it, the floors (and,
  # for sqlglot, the version the parser's reject-branch behaviour was
  # written against) would be asserted-compatible but never tested.
  test-min-versions:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bootstrap the MCP read-only role
        run: >-
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d postgres
          -v ON_ERROR_STOP=1 -v app_role=postgres -f sql/role_setup.sql
      - name: Pin dependency floors
        # Keep in sync with the lower bounds in pyproject.toml.
        run: |
          cat > /tmp/min-constraints.txt <<'EOF'
          django==4.2
          djangorestframework==3.14
          django-oauth-toolkit==3.2
          sqlglot==30.7
          mcp==1.27
          a2wsgi==1.10
          pydantic==2.11
          django-allauth==65.14
          EOF
      - name: Install package + test deps at floors
        run: pip install -e '.[allauth,test]' -c /tmp/min-constraints.txt
      - name: Run the test suite
        run: pytest --pyargs mcp_sql.tests --create-db --nomigrations

  # Single representative run (newest-resolve on the current Python) that
  # measures coverage and uploads it to Codecov. One job, not the whole matrix
  # — coverage of the code is version-independent, so a per-leg upload would
  # only add noise. Coverage source/omit live in [tool.coverage.run].
  coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Bootstrap the MCP read-only role
        run: >-
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d postgres
          -v ON_ERROR_STOP=1 -v app_role=postgres -f sql/role_setup.sql
      - name: Install package + test deps
        run: pip install -e '.[allauth,test]'
      - name: Run the suite with coverage
        run: pytest --pyargs mcp_sql.tests --create-db --nomigrations --cov=mcp_sql --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: thepapermen/django-mcp-sql
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
      - name: Validate distribution metadata
        run: twine check dist/*
